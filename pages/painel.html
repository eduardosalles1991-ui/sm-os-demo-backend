<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Painel — Jurimetrix</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;overflow:hidden;">
<style>
/* Reset WordPress */
.juri-wrap{all:initial;display:block;font-family:'Lato',sans-serif;}
.juri-wrap *{box-sizing:border-box;margin:0;padding:0;}
.juri-wrap a{text-decoration:none;}

/* Fonts */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Lato:wght@400;700&display=swap');

/* Variables */
.juri-wrap{
  --navy:#1B2B4B;--teal:#2A7A8C;--gold:#C8A84B;
  --bg:#F4F6F9;--white:#fff;--border:#E2E8F0;
  --muted:#64748B;--danger:#DC2626;--success:#16A34A;
  --glass:rgba(255,255,255,0.85);
  --blur:blur(24px) saturate(1.4);
}

/* Layout */
.juri-wrap{
  position:fixed;inset:0;z-index:99999;
  background:
    radial-gradient(ellipse 70% 50% at 15% 15%,rgba(42,122,140,.12) 0%,transparent 55%),
    radial-gradient(ellipse 50% 70% at 85% 85%,rgba(27,43,75,.10) 0%,transparent 55%),
    linear-gradient(135deg,#EAF0F8 0%,#DCE8F5 100%);
  display:flex;
}

/* Debug bar */
.juri-debug{
  position:fixed;top:0;left:0;right:0;
  background:#1B2B4B;color:#fff;
  font-family:monospace;font-size:12px;
  padding:8px 16px;z-index:100000;
  display:flex;align-items:center;gap:16px;
}

/* Sidebar */
.juri-sidebar{
  width:240px;flex-shrink:0;
  background:rgba(27,43,75,0.92);
  display:flex;flex-direction:column;
  padding:20px 14px;
  border-right:1px solid rgba(255,255,255,.08);
}
.juri-logo{display:flex;align-items:center;gap:9px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:12px;}
.juri-logo-icon{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.15);display:grid;place-items:center;}
.juri-logo-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:.09em;color:#fff;}
.juri-nav{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-weight:700;transition:all .2s;}
.juri-nav:hover,.juri-nav.active{background:rgba(255,255,255,.12);color:#fff;}
.juri-nav.active{border-left:3px solid #C8A84B;}
.juri-sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);}
.juri-avatar-row{display:flex;align-items:center;gap:9px;padding:8px 12px;}
.juri-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2A7A8C,#1B2B4B);display:grid;place-items:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#fff;}
.juri-uname{font-size:12px;font-weight:700;color:#fff;}
.juri-uplan{font-size:10px;color:#C8A84B;font-weight:700;letter-spacing:.06em;}
.juri-logout{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;margin-top:8px;transition:all .2s;}
.juri-logout:hover{border-color:rgba(220,38,38,.4);color:#f87171;}

/* Main */
.juri-main{flex:1;overflow-y:auto;padding:32px;}
.juri-page{display:none;}.juri-page.active{display:block;}
.juri-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:26px;letter-spacing:.04em;color:#1B2B4B;margin-bottom:22px;}

/* Cards */
.juri-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:22px;}
.juri-card{background:var(--glass);border:1px solid rgba(255,255,255,.7);border-radius:14px;padding:18px 20px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:0 2px 12px rgba(27,43,75,.07);}
.juri-card-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748B;margin-bottom:8px;}
.juri-card-val{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:#1B2B4B;}
.juri-card-sub{font-size:11px;color:#64748B;margin-top:3px;}

/* Token bar */
.juri-bar-wrap{background:var(--glass);border:1px solid rgba(255,255,255,.7);border-radius:14px;padding:20px 22px;margin-bottom:22px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);}
.juri-bar-header{display:flex;justify-content:space-between;margin-bottom:12px;}
.juri-bar-title{font-size:13px;font-weight:700;color:#1B2B4B;}
.juri-bar{height:8px;background:rgba(27,43,75,.08);border-radius:4px;overflow:hidden;}
.juri-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2A7A8C,#3A9AAC);transition:width .5s;}
.juri-bar-details{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#64748B;}

/* Plano */
.juri-plano-card{background:var(--glass);border:1.5px solid rgba(27,43,75,.2);border-radius:14px;padding:22px;margin-bottom:22px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);}
.juri-plano-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.juri-plano-nome{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#1B2B4B;}
.juri-plano-badge{background:#1B2B4B;color:#fff;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:4px 12px;border-radius:999px;}
.juri-btn{padding:10px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,#1B2B4B,#2A7A8C);color:#fff;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.05em;box-shadow:0 2px 10px rgba(27,43,75,.18);}

/* Loading state */
.juri-loading{display:flex;align-items:center;justify-content:center;height:100%;font-size:14px;color:#64748B;}
</style>

<!-- Debug bar -->
<div class="juri-debug" id="juri-debug">
  <span id="juri-status">⏳ HTML carregado — aguardando JS...</span>
  <span id="juri-info" style="opacity:.7;font-size:11px;"></span>
</div>
<!-- Emergency fallback — shows if JS never runs -->
<div id="juri-fallback" style="position:fixed;inset:0;z-index:99998;background:#EAF0F8;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:Lato,sans-serif;">
  <div style="font-size:48px;">⏳</div>
  <div style="font-size:18px;color:#1B2B4B;font-weight:700;">Carregando painel...</div>
  <div id="juri-fallback-msg" style="font-size:13px;color:#64748B;">Verificando autenticação</div>
</div>

<!-- Main wrap — position:fixed to escape WordPress layout -->
<div class="juri-wrap" id="juri-wrap" style="display:none;padding-top:32px;">

  <!-- Sidebar -->
  <div class="juri-sidebar">
    <div class="juri-logo">
      <div class="juri-logo-icon">
        <svg width="16" height="16" viewBox="0 0 80 80" fill="none">
          <rect x="16" y="60" width="48" height="4" rx="1.5" fill="white" opacity=".8"/>
          <rect x="18" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
          <rect x="30" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
          <rect x="44" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
          <rect x="56" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
          <path d="M10 30 L40 8 L70 30 Z" fill="white" opacity=".8"/>
          <line x1="40" y1="14" x2="40" y2="20" stroke="#C8A84B" stroke-width="2" stroke-linecap="round"/>
          <line x1="34" y1="20" x2="46" y2="20" stroke="#C8A84B" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="juri-logo-name">JURIMETRIX</span>
    </div>
    <button class="juri-nav active" onclick="juriPage('overview')">◈ Visão geral</button>
    <button class="juri-nav" onclick="juriPage('plano')">✦ Meu plano</button>
    <button class="juri-nav" onclick="window.location.href='https://jurimetrix.com'">◉ Abrir chat</button>
    <div class="juri-sidebar-footer">
      <div class="juri-avatar-row">
        <div class="juri-avatar" id="juri-av">J</div>
        <div>
          <div class="juri-uname" id="juri-nm">Carregando…</div>
          <div class="juri-uplan" id="juri-pl">FREE</div>
        </div>
      </div>
      <button class="juri-logout" onclick="juriLogout()">Sair da conta</button>
    </div>
  </div>

  <!-- Main -->
  <div class="juri-main">
    <div class="juri-page active" id="juri-overview">
      <div class="juri-title">Visão Geral</div>
      <div class="juri-cards">
        <div class="juri-card"><div class="juri-card-label">Plano atual</div><div class="juri-card-val" id="juri-s-plano">—</div><div class="juri-card-sub" id="juri-s-status">—</div></div>
        <div class="juri-card"><div class="juri-card-label">Tokens disponíveis</div><div class="juri-card-val" id="juri-s-disp">—</div><div class="juri-card-sub" id="juri-s-total">—</div></div>
        <div class="juri-card"><div class="juri-card-label">Uso este mês</div><div class="juri-card-val" id="juri-s-pct">—%</div><div class="juri-card-sub" id="juri-s-usado">—</div></div>
      </div>
      <div class="juri-bar-wrap">
        <div class="juri-bar-header"><span class="juri-bar-title">Consumo de tokens</span><span id="juri-bar-pct">0%</span></div>
        <div class="juri-bar"><div class="juri-bar-fill" id="juri-bar-fill" style="width:0%"></div></div>
        <div class="juri-bar-details"><span id="juri-bar-usado">0 usados</span><span id="juri-bar-disp">0 disponíveis</span></div>
      </div>
      <div style="text-align:center;padding:8px;">
        <button class="juri-btn" onclick="window.location.href='https://jurimetrix.com/pricing/'">Ver planos e fazer upgrade</button>
      </div>
    </div>

    <div class="juri-page" id="juri-plano-page">
      <div class="juri-title">Meu Plano</div>
      <div class="juri-plano-card">
        <div class="juri-plano-header">
          <div class="juri-plano-nome" id="juri-p-nome">—</div>
          <span class="juri-plano-badge" id="juri-p-badge">ATIVO</span>
        </div>
        <button class="juri-btn" onclick="window.location.href='https://jurimetrix.com/pricing/'">Ver outros planos</button>
      </div>
    </div>
  </div>
</div>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
var PSURL = "https://jqwojzxbguzzlweebwyj.supabase.co";
var PSKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impxd29qenhiZ3V6emx3ZWVid3lqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQwODcsImV4cCI6MjA5MDQ3MDA4N30.m1OEcUla2TS2BAVgaoRiZKQXp1ujsPvv5mDDMH-_y00";
var PBACK = "https://sm-os-demo-backend.onrender.com";
var psb = null, psession = null;

function pInit(){
  if(typeof supabase === "undefined"){ setTimeout(pInit, 200); return; }
  psb = supabase.createClient(PSURL, PSKEY);

  var hash = window.location.hash.replace("#","");
  var hp = new URLSearchParams(hash);
  var tk = hp.get("tk");
  var rf = hp.get("rf");

  if(tk && rf){
    psb.auth.setSession({
      access_token:  decodeURIComponent(tk),
      refresh_token: decodeURIComponent(rf)
    }).then(function(r){
      if(r.data && r.data.session){
        psession = r.data.session;
        localStorage.setItem("juri_token",   psession.access_token);
        localStorage.setItem("juri_refresh",  psession.refresh_token);
        var checkout = hp.get("checkout");
        var periodo  = hp.get("periodo") || "mensal";
        history.replaceState(null,"", checkout
          ? "/painel-do-cliente/?checkout="+checkout+"&periodo="+periodo
          : "/painel-do-cliente/");
        pLoadUser();
        pCheckCheckout();
      } else {
        pTrySession();
      }
    });
  } else {
    pTrySession();
  }
}

function pTrySession(){
  psb.auth.getSession().then(function(r){
    var s = r.data && r.data.session;
    if(!s){
      var storedTk = localStorage.getItem("juri_token");
      var storedRf = localStorage.getItem("juri_refresh");
      if(storedTk && storedRf){
        psb.auth.setSession({access_token:storedTk,refresh_token:storedRf}).then(function(r2){
          var s2 = r2.data && r2.data.session;
          if(s2){ psession=s2; pLoadUser(); pCheckCheckout(); }
          else { window.location.href="https://jurimetrix.com/login-cadastro/"; }
        });
      } else {
        window.location.href="https://jurimetrix.com/login-cadastro/";
      }
    } else {
      psession = s;
      localStorage.setItem("juri_token",  s.access_token);
      localStorage.setItem("juri_refresh", s.refresh_token);
      pLoadUser();
      pCheckCheckout();
    }
  });
}

function pLoadUser(){
  fetch(PBACK+"/me",{headers:{"Authorization":"Bearer "+psession.access_token}})
  .then(function(r){ return r.ok ? r.json() : null; })
  .then(function(d){
    var user  = (d && d.perfil)      || {};
    var assin = (d && d.assinatura)  || {};
    if(!user.email){
      var u = psession.user;
      user  = {nome:(u.user_metadata&&u.user_metadata.nome)||u.email, email:u.email};
      assin = {plano_slug:"free",status:"ativa",tokens_mes:1000000,tokens_usados_mes:0};
    }
    pRender(user, assin);
  }).catch(function(){
    var u = psession.user;
    pRender(
      {nome:(u.user_metadata&&u.user_metadata.nome)||u.email, email:u.email},
      {plano_slug:"free",status:"ativa",tokens_mes:1000000,tokens_usados_mes:0}
    );
  });
}

function pFmtN(n){
  if(!n) return "0";
  if(n>=999000000) return "Ilimitados";
  if(n>=1000000) return (n/1000000).toFixed(1).replace(".0","")+"M";
  if(n>=1000) return (n/1000).toFixed(0)+"K";
  return String(n);
}

function pSet(id,val){ var el=document.getElementById(id); if(el) el.textContent=val; }

function pRender(user, assin){
  var nome  = user.nome || user.email || "Usuário";
  var plano = (assin.plano_slug || "free");
  var tm    = assin.tokens_mes || 1000000;
  var tu    = assin.tokens_usados_mes || 0;
  var disp  = Math.max(0, tm - tu);
  var pct   = tm ? Math.round(tu/tm*100) : 0;

  // Sidebar
  var av = document.getElementById("juri-av");
  var nm = document.getElementById("juri-nm");
  var pl = document.getElementById("juri-pl");
  if(av) av.textContent = nome[0].toUpperCase();
  if(nm) nm.textContent = nome;
  if(pl) pl.textContent = plano.toUpperCase();

  // Stats
  pSet("juri-s-plano",  plano.charAt(0).toUpperCase()+plano.slice(1));
  pSet("juri-s-status", assin.status==="ativa"?"Ativo":"—");
  pSet("juri-s-disp",   pFmtN(disp));
  pSet("juri-s-total",  "de "+pFmtN(tm)+" / mês");
  pSet("juri-s-pct",    pct+"%");
  pSet("juri-s-usado",  pFmtN(tu)+" usados");
  pSet("juri-bar-pct",  pct+"%");
  pSet("juri-bar-usado",pFmtN(tu)+" usados");
  pSet("juri-bar-disp", pFmtN(disp)+" disponíveis");
  pSet("juri-p-nome",   plano.toUpperCase());

  var fill = document.getElementById("juri-bar-fill");
  if(fill){
    fill.style.width = Math.min(pct,100)+"%";
    fill.className = "juri-bar-fill"+(pct>90?" danger":pct>70?" warn":"");
  }

  // Show panel
  var wrap = document.getElementById("juri-wrap");
  if(wrap) wrap.style.display = "flex";

  // Hide debug bar
  setTimeout(function(){
    var dbg = document.getElementById("juri-debug");
    if(dbg) dbg.style.display = "none";
  }, 3000);
}

function juriPage(id){
  document.querySelectorAll(".juri-page").forEach(function(p){ p.classList.remove("active"); });
  document.querySelectorAll(".juri-nav").forEach(function(n){ n.classList.remove("active"); });
  var pg = document.getElementById("juri-"+id) || document.getElementById("juri-"+id+"-page");
  if(pg) pg.classList.add("active");
  var navs = document.querySelectorAll(".juri-nav");
  var map = {overview:0, plano:1};
  if(map[id] !== undefined && navs[map[id]]) navs[map[id]].classList.add("active");
}

function juriLogout(){
  if(psb) psb.auth.signOut();
  localStorage.removeItem("juri_token");
  localStorage.removeItem("juri_refresh");
  window.location.href = "https://jurimetrix.com/login-cadastro/";
}

function pCheckCheckout(){
  var pa = new URLSearchParams(window.location.search);
  var co = pa.get("checkout");
  var pe = pa.get("periodo") || "mensal";
  if(co && co !== "free"){
    var mn = document.getElementById("m-nome");
    var modal = document.getElementById("modal");
    if(mn) mn.textContent = co.toUpperCase();
    if(modal) modal.classList.add("open");
  }
}

function setMeth(m, btn){
  document.querySelectorAll(".meth").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
  var cf = document.getElementById("card-fields");
  var pb = document.getElementById("pix-box");
  if(cf) cf.style.display = m==="CREDIT_CARD" ? "block" : "none";
  if(pb) pb.style.display = "none";
  window._pMetodo = m;
}

function closeModal(){
  var modal = document.getElementById("modal");
  if(modal) modal.classList.remove("open");
  history.replaceState({},"",window.location.pathname);
}

function pagar(){
  if(!psession) return;
  var btn = document.getElementById("btn-pay");
  btn.disabled = true; btn.textContent = "PROCESSANDO...";
  var pa = new URLSearchParams(window.location.search);
  fetch(PBACK+"/assinatura/checkout",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+psession.access_token},
    body:JSON.stringify({
      plano: (document.getElementById("m-nome")&&document.getElementById("m-nome").textContent.toLowerCase()) || "plus",
      periodo: pa.get("periodo") || "mensal",
      metodo: window._pMetodo || "PIX",
      cpf_cnpj: (document.getElementById("cpf")&&document.getElementById("cpf").value) || null
    })
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d.pix_copia_cola){
      var pc = document.getElementById("pix-code");
      var pb = document.getElementById("pix-box");
      var mm = document.getElementById("m-msg");
      if(pc) pc.textContent = d.pix_copia_cola;
      if(pb) pb.style.display = "block";
      if(mm){ mm.textContent="PIX gerado! Após o pagamento seu plano será ativado."; mm.className="msg success"; }
    } else if(d.url_pagamento){
      window.open(d.url_pagamento,"_blank");
    }
  }).catch(function(e){
    var mm = document.getElementById("m-msg");
    if(mm){ mm.textContent="Erro: "+e.message; mm.className="msg error"; }
  }).finally(function(){
    btn.disabled=false; btn.textContent="GERAR PAGAMENTO";
  });
}

function copiarPix(){
  var code = document.getElementById("pix-code");
  if(!code) return;
  navigator.clipboard.writeText(code.textContent).then(function(){
    var btn = document.querySelector(".btn-copy");
    if(btn){ btn.textContent="✓ COPIADO!"; setTimeout(function(){ btn.textContent="COPIAR CÓDIGO PIX"; },2000); }
  });
}

function cancelar(){
  if(!confirm("Cancelar assinatura? Acesso mantido até o fim do período pago.")) return;
  fetch(PBACK+"/assinatura/cancelar",{method:"POST",headers:{"Authorization":"Bearer "+psession.access_token}})
  .then(function(r){ return r.json(); }).then(function(d){ alert(d.message||"Cancelado."); pLoadUser(); });
}

// Start
pInit();
</script>

</body>
</html>
