<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Jurimetrix — Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2B4B;--teal:#2A7A8C;--gold:#C8A84B;--muted:#64748B;--danger:#DC2626;--success:#16A34A;--glass:rgba(255,255,255,0.85);--blur:blur(24px) saturate(1.4);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}

/* Loading screen profissional */
#juri-loading{
  position:fixed;inset:0;z-index:99999;
  background:linear-gradient(135deg,#1B2B4B 0%,#2A7A8C 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity .5s ease;
}
#juri-loading.hide{opacity:0;pointer-events:none;}
.loading-logo{width:64px;height:64px;animation:pulse-logo 2s ease-in-out infinite;}
@keyframes pulse-logo{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.7;transform:scale(.95);}}
.loading-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:24px;letter-spacing:.12em;color:#fff;}
.loading-sub{font-size:13px;color:rgba(255,255,255,.6);font-style:italic;}
.loading-bar{width:200px;height:3px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;}
.loading-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#C8A84B,#fff);border-radius:999px;animation:load-progress 2s ease forwards;}
@keyframes load-progress{0%{width:0%}60%{width:70%}100%{width:95%}}

/* Layout */
.juri-wrap{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(42,122,140,.12) 0%,transparent 55%),radial-gradient(ellipse 50% 70% at 85% 85%,rgba(27,43,75,.10) 0%,transparent 55%),linear-gradient(135deg,#EAF0F8 0%,#DCE8F5 100%);
  display:none;
}
.juri-wrap.show{display:flex;}

/* Sidebar */
.juri-sidebar{width:240px;flex-shrink:0;background:rgba(27,43,75,0.92);display:flex;flex-direction:column;padding:20px 14px;border-right:1px solid rgba(255,255,255,.08);}
.juri-logo{display:flex;align-items:center;gap:9px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:12px;}
.juri-logo-icon{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.15);display:grid;place-items:center;}
.juri-logo-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:.09em;color:#fff;}
.juri-nav{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-weight:700;transition:all .2s;}
.juri-nav:hover,.juri-nav.active{background:rgba(255,255,255,.12);color:#fff;}
.juri-nav.active{border-left:3px solid #C8A84B;}
.juri-sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);}
.juri-avatar-row{display:flex;align-items:center;gap:9px;padding:8px 12px;}
.juri-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2A7A8C,#1B2B4B);display:grid;place-items:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#fff;}
.juri-uname{font-size:12px;font-weight:700;color:#fff;}
.juri-uplan{font-size:10px;color:#C8A84B;font-weight:700;letter-spacing:.06em;}
.juri-logout{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;margin-top:8px;transition:all .2s;}
.juri-logout:hover{border-color:rgba(220,38,38,.4);color:#f87171;}

/* Main */
.juri-main{flex:1;overflow-y:auto;padding:32px;}
.juri-page{display:none;}.juri-page.active{display:block;}
.juri-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:26px;letter-spacing:.04em;color:#1B2B4B;margin-bottom:22px;}

/* Cards */
.juri-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:22px;}
.juri-card{background:var(--glass);border:1px solid rgba(255,255,255,.7);border-radius:14px;padding:18px 20px;backdrop-filter:var(--blur);box-shadow:0 2px 12px rgba(27,43,75,.07);}
.juri-card-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748B;margin-bottom:8px;}
.juri-card-val{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:#1B2B4B;}
.juri-card-sub{font-size:11px;color:#64748B;margin-top:3px;}

/* Token bar */
.juri-bar-wrap{background:var(--glass);border:1px solid rgba(255,255,255,.7);border-radius:14px;padding:20px 22px;margin-bottom:22px;backdrop-filter:var(--blur);}
.juri-bar-header{display:flex;justify-content:space-between;margin-bottom:12px;}
.juri-bar-title{font-size:13px;font-weight:700;color:#1B2B4B;}
.juri-bar{height:8px;background:rgba(27,43,75,.08);border-radius:4px;overflow:hidden;}
.juri-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2A7A8C,#3A9AAC);transition:width .6s cubic-bezier(.4,0,.2,1);}
.juri-bar-details{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#64748B;}

/* Plano */
.juri-plano-card{background:var(--glass);border:1.5px solid rgba(27,43,75,.15);border-radius:14px;padding:22px;margin-bottom:16px;backdrop-filter:var(--blur);}
.juri-plano-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.juri-plano-nome{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#1B2B4B;}
.juri-plano-badge{background:#1B2B4B;color:#fff;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:4px 12px;border-radius:999px;}
.juri-btn{padding:10px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,#1B2B4B,#2A7A8C);color:#fff;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.05em;box-shadow:0 2px 10px rgba(27,43,75,.18);transition:all .2s;}
.juri-btn:hover{opacity:.9;transform:translateY(-1px);}

/* Error screen */
#juri-error{display:none;position:fixed;inset:0;z-index:99998;background:linear-gradient(135deg,#1B2B4B,#2A7A8C);align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:'Lato',sans-serif;}
#juri-error.show{display:flex;}
#juri-error p{color:rgba(255,255,255,.7);font-size:14px;}
#juri-error a{color:#C8A84B;font-weight:700;text-decoration:none;}
</style>
</head>
<body>

<!-- Loading screen profissional -->
<div id="juri-loading">
  <svg class="loading-logo" viewBox="0 0 80 80" fill="none">
    <rect x="16" y="60" width="48" height="4" rx="1.5" fill="white" opacity=".8"/>
    <rect x="18" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
    <rect x="30" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
    <rect x="44" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
    <rect x="56" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
    <path d="M10 30 L40 8 L70 30 Z" fill="white" opacity=".8"/>
    <line x1="40" y1="14" x2="40" y2="20" stroke="#C8A84B" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="20" x2="46" y2="20" stroke="#C8A84B" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <div class="loading-name">JURIMETRIX</div>
  <div class="loading-sub">Carregando seu painel...</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<!-- Error screen -->
<div id="juri-error">
  <svg width="48" height="48" viewBox="0 0 80 80" fill="none">
    <rect x="16" y="60" width="48" height="4" rx="1.5" fill="white" opacity=".5"/>
    <rect x="18" y="30" width="6" height="30" rx="2" fill="white" opacity=".5"/>
    <rect x="30" y="30" width="6" height="30" rx="2" fill="white" opacity=".5"/>
    <rect x="44" y="30" width="6" height="30" rx="2" fill="white" opacity=".5"/>
    <rect x="56" y="30" width="6" height="30" rx="2" fill="white" opacity=".5"/>
    <path d="M10 30 L40 8 L70 30 Z" fill="white" opacity=".5"/>
  </svg>
  <div style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:.06em;">Sessão expirada</div>
  <p>Faça login novamente para acessar o painel.</p>
  <a href="https://jurimetrix.com/login-cadastro/">← Ir para o login</a>
</div>

<!-- Painel -->
<div class="juri-wrap" id="juri-wrap">
  <div class="juri-sidebar">
    <div class="juri-logo">
      <div class="juri-logo-icon">
        <svg width="16" height="16" viewBox="0 0 80 80" fill="none">
          <rect x="16" y="60" width="48" height="4" rx="1.5" fill="white" opacity=".8"/>
          <rect x="18" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
          <rect x="30" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
          <rect x="44" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
          <rect x="56" y="30" width="6" height="30" rx="2" fill="white" opacity=".7"/>
          <path d="M10 30 L40 8 L70 30 Z" fill="white" opacity=".8"/>
          <line x1="40" y1="14" x2="40" y2="20" stroke="#C8A84B" stroke-width="2" stroke-linecap="round"/>
          <line x1="34" y1="20" x2="46" y2="20" stroke="#C8A84B" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="juri-logo-name">JURIMETRIX</span>
    </div>
    <button class="juri-nav active" onclick="juriPage('overview')">◈ Visão geral</button>
    <button class="juri-nav" onclick="juriPage('plano')">✦ Meu plano</button>
    <button class="juri-nav" onclick="window.open('https://sm-os-demo-backend.onrender.com/chat-app','_self')">◉ Abrir chat</button>
    <div class="juri-sidebar-footer">
      <div class="juri-avatar-row">
        <div class="juri-avatar" id="juri-av">J</div>
        <div>
          <div class="juri-uname" id="juri-nm">Carregando…</div>
          <div class="juri-uplan" id="juri-pl">FREE</div>
        </div>
      </div>
      <button class="juri-logout" onclick="juriLogout()">Sair da conta</button>
    </div>
  </div>

  <div class="juri-main">
    <!-- Visão geral -->
    <div class="juri-page active" id="juri-overview">
      <div class="juri-title">Visão Geral</div>
      <div class="juri-cards">
        <div class="juri-card"><div class="juri-card-label">Plano atual</div><div class="juri-card-val" id="juri-s-plano">—</div><div class="juri-card-sub" id="juri-s-status">—</div></div>
        <div class="juri-card"><div class="juri-card-label">Tokens disponíveis</div><div class="juri-card-val" id="juri-s-disp">—</div><div class="juri-card-sub" id="juri-s-total">—</div></div>
        <div class="juri-card"><div class="juri-card-label">Uso este mês</div><div class="juri-card-val" id="juri-s-pct">—%</div><div class="juri-card-sub" id="juri-s-usado">—</div></div>
      </div>
      <div class="juri-bar-wrap">
        <div class="juri-bar-header"><span class="juri-bar-title">Consumo de tokens</span><span id="juri-bar-pct">0%</span></div>
        <div class="juri-bar"><div class="juri-bar-fill" id="juri-bar-fill" style="width:0%"></div></div>
        <div class="juri-bar-details"><span id="juri-bar-usado">0 usados</span><span id="juri-bar-disp">0 disponíveis</span></div>
      </div>
      <div style="text-align:center;padding:8px;">
        <button class="juri-btn" onclick="window.open('https://jurimetrix.com/pricing/','_blank')">Ver planos e fazer upgrade</button>
      </div>
    </div>

    <!-- Meu plano -->
    <div class="juri-page" id="juri-plano-page">
      <div class="juri-title">Meu Plano</div>
      <div class="juri-plano-card">
        <div class="juri-plano-header">
          <div class="juri-plano-nome" id="juri-p-nome">—</div>
          <span class="juri-plano-badge" id="juri-p-badge">ATIVO</span>
        </div>
        <p style="font-size:13px;color:#64748B;margin-bottom:16px;" id="juri-p-desc">—</p>
        <button class="juri-btn" onclick="window.open('https://jurimetrix.com/pricing/','_blank')">Ver outros planos</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
  var SURL = "https://jqwojzxbguzzlweebwyj.supabase.co";
  var SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impxd29qenhiZ3V6emx3ZWVid3lqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQwODcsImV4cCI6MjA5MDQ3MDA4N30.m1OEcUla2TS2BAVgaoRiZKQXp1ujsPvv5mDDMH-_y00";
  var BACK = "https://sm-os-demo-backend.onrender.com";

  function showError(){
    document.getElementById('juri-loading').style.display='none';
    document.getElementById('juri-error').classList.add('show');
  }

  function showPanel(){
    var ld = document.getElementById('juri-loading');
    ld.classList.add('hide');
    setTimeout(function(){
      ld.style.display='none';
      document.getElementById('juri-wrap').classList.add('show');
    }, 500);
  }

  function fmtN(n){
    if(!n && n!==0) return "—";
    if(n>=999000000) return "Ilimitados";
    if(n>=1000000) return (n/1000000).toFixed(1).replace(".0","")+"M";
    if(n>=1000) return (n/1000).toFixed(0)+"K";
    return String(n);
  }

  function juriPage(id){
    document.querySelectorAll('.juri-page').forEach(function(p){p.classList.remove('active');});
    document.querySelectorAll('.juri-nav').forEach(function(n){n.classList.remove('active');});
    var pg = document.getElementById('juri-'+id) || document.getElementById('juri-'+id+'-page');
    if(pg) pg.classList.add('active');
    // Mark nav active
    document.querySelectorAll('.juri-nav').forEach(function(n){
      if(n.getAttribute('onclick') && n.getAttribute('onclick').includes("'"+id+"'")){n.classList.add('active');}
    });
  }
  window.juriPage = juriPage;

  function render(user, assin){
    var nome = (user && (user.nome || user.email)) || "Usuário";
    var plano = (assin && assin.plano_slug) || "free";
    var tokens_mes = (assin && assin.tokens_mes) || 1000000;
    var tokens_usados = (assin && assin.tokens_usados_mes) || 0;
    var disp = Math.max(0, tokens_mes - tokens_usados);
    var pct = tokens_mes >= 999000000 ? 0 : Math.round(tokens_usados/tokens_mes*100);

    var set = function(id,val){ var el=document.getElementById(id); if(el) el.textContent=val; };

    var av = document.getElementById('juri-av');
    var nm = document.getElementById('juri-nm');
    var pl = document.getElementById('juri-pl');
    if(av) av.textContent = nome[0].toUpperCase();
    if(nm) nm.textContent = nome;
    if(pl) pl.textContent = plano.toUpperCase();

    set('juri-s-plano', plano.charAt(0).toUpperCase()+plano.slice(1));
    set('juri-s-status', (assin&&assin.status==='ativa')?'Ativo':'—');
    set('juri-s-disp', fmtN(tokens_mes>=999000000 ? 999000000 : disp));
    set('juri-s-total', 'de '+fmtN(tokens_mes)+' / mês');
    set('juri-s-pct', tokens_mes>=999000000 ? '∞' : pct+'%');
    set('juri-s-usado', fmtN(tokens_usados)+' usados');
    set('juri-bar-pct', tokens_mes>=999000000 ? '∞' : pct+'%');
    set('juri-bar-usado', fmtN(tokens_usados)+' usados');
    set('juri-bar-disp', fmtN(tokens_mes>=999000000 ? 999000000 : disp)+' disponíveis');
    set('juri-p-nome', plano.toUpperCase());

    var precos = {free:'Gratuito',plus:'R$109,99/mês',pro:'R$549,99/mês',unlimited:'R$999,99/mês'};
    set('juri-p-desc', precos[plano] || '—');

    var fill = document.getElementById('juri-bar-fill');
    if(fill) fill.style.width = Math.min(pct,100)+'%';

    showPanel();
  }

  window.juriLogout = async function(){
    if(typeof window._juriSB !== 'undefined') await window._juriSB.auth.signOut();
    localStorage.removeItem('juri_token');
    localStorage.removeItem('juri_refresh');
    localStorage.removeItem('juri_user');
    window.location.href = "https://jurimetrix.com/login-cadastro/";
  };

  async function loadAndRender(session){
    var user = null, assin = null;
    try{
      var r = await fetch(BACK+"/me", {headers:{"Authorization":"Bearer "+session.access_token}});
      if(r.ok){
        var d = await r.json();
        user  = d.perfil  || {};
        assin = d.assinatura || {};
      }
    }catch(e){ console.warn('loadAndRender:', e); }

    if(!user || !user.email){
      var u = session.user;
      user  = {nome:(u.user_metadata&&u.user_metadata.nome)||u.email, email:u.email};
      assin = {plano_slug:'free',status:'ativa',tokens_mes:1000000,tokens_usados_mes:0};
    }

    render(user, assin);
  }

  async function init(){
    if(typeof supabase === 'undefined'){
      showError(); return;
    }

    var sb = supabase.createClient(SURL, SKEY);
    window._juriSB = sb;

    // Try hash token
    var hash = window.location.hash.replace('#','');
    var hp   = new URLSearchParams(hash);
    var tk   = hp.get('tk');
    var rf   = hp.get('rf');

    if(tk && rf){
      try{
        var res = await sb.auth.setSession({
          access_token:  decodeURIComponent(tk),
          refresh_token: decodeURIComponent(rf)
        });
        if(res.data && res.data.session){
          history.replaceState(null,'',window.location.pathname);
          localStorage.setItem('juri_token',  res.data.session.access_token);
          localStorage.setItem('juri_refresh', res.data.session.refresh_token);
          await loadAndRender(res.data.session);
          return;
        }
      }catch(e){ console.warn('setSession:', e); }
    }

    // Try existing session
    var {data} = await sb.auth.getSession();
    var s = data && data.session;

    // Try localStorage
    if(!s){
      var storedTk = localStorage.getItem('juri_token');
      var storedRf = localStorage.getItem('juri_refresh');
      if(storedTk && storedRf){
        try{
          var res2 = await sb.auth.setSession({access_token:storedTk, refresh_token:storedRf});
          s = res2.data && res2.data.session;
        }catch(e){ console.warn('refresh:', e); }
      }
    }

    if(!s){ showError(); return; }

    await loadAndRender(s);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
